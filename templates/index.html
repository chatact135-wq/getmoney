<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Signals</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 20px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        .status-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #00ff00;
            margin-right: 8px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            background-color: #1e1e1e;
            border-radius: 8px;
            overflow: hidden;
        }
        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #333;
        }
        th {
            color: #aaa;
            font-weight: 600;
            background-color: #252525;
        }
        .signal-buy {
            color: #00ff00;
            font-weight: bold;
        }
        .signal-sell {
            color: #ff4444;
            font-weight: bold;
        }
        .signal-hold {
            color: #ffbb33;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="header">
        <h2>Live Trading Signals</h2>
        <div id="connection-status">
            <span class="status-indicator" id="main-status-dot"></span>
            <span id="main-status-text">System Online</span>
        </div>
    </div>

    <table>
        <thead>
            <tr>
                <th>Asset</th>
                <th>Signal</th>
                <th>Price</th>
                <th>Timestamp</th>
            </tr>
        </thead>
        <tbody id="signals-table-body">
            <tr>
                <td colspan="4" style="text-align: center; color: #aaa;">Fetching live market data...</td>
            </tr>
        </tbody>
    </table>

    <script>
        // Safe Auto-Refresh Logic (Polling)
        async function fetchSignals() {
            try {
                // Silently request data from your FastAPI backend
                const response = await fetch('/api/signals');
                
                if (response.ok) {
                    const data = await response.json();
                    
                    // Update connection UI to show healthy status
                    document.getElementById('main-status-dot').style.background = '#00ff00';
                    document.getElementById('main-status-text').innerText = 'System Online';

                    // Check if we actually have data
                    if (!data || data.length === 0) {
                        document.getElementById('signals-table-body').innerHTML = '<tr><td colspan="4" style="text-align: center; color: #aaa;">No signals generated yet.</td></tr>';
                        return;
                    }

                    // Build the table rows based on your API data
                    let rowsHtml = '';
                    data.forEach(item => {
                        // Determine the color class based on the signal word
                        let signalClass = 'signal-hold';
                        let signalText = (item.signal || '').toUpperCase();
                        
                        if (signalText === 'BUY') signalClass = 'signal-buy';
                        if (signalText === 'SELL') signalClass = 'signal-sell';

                        rowsHtml += `
                            <tr>
                                <td><strong>${item.asset || '--'}</strong></td>
                                <td class="${signalClass}">${signalText || '--'}</td>
                                <td>${item.price ? '$' + item.price : '--'}</td>
                                <td style="color: #888;">${item.timestamp || '--'}</td>
                            </tr>
                        `;
                    });

                    // Inject the new rows into the table
                    document.getElementById('signals-table-body').innerHTML = rowsHtml;
                    
                } else {
                    throw new Error("Server returned " + response.status);
                }
            } catch (error) {
                console.error("Connection lost:", error);
                // Visually show that the connection to the backend dropped
                document.getElementById('main-status-dot').style.background = '#ff4444';
                document.getElementById('main-status-text').innerText = 'Connection Lost';
            }
        }

        // Run immediately on page load
        fetchSignals();
        
        // Auto-refresh the data every 3 seconds (3000 ms)
        setInterval(fetchSignals, 3000);
    </script>
</body>
</html>
