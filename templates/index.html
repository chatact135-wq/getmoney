<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quant Signal System</title>
    <style>
        :root {
            --bg-color: #0b101e;
            --card-bg: #23283b;
            --inner-bg: #151928;
            --text-main: #ffffff;
            --text-muted: #8b93a6;
            --sell-red: #ff4a5a;
            --buy-green: #00c881;
            --timer-green: #2ecf9e;
            --trigger-yellow: #ffc145;
            --btn-bg: #353d52;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 20px;
        }

        h1 {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 0.5px;
            margin: 0 0 15px 0;
            text-transform: uppercase;
        }

        .top-controls {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
            border-bottom: 1px solid #1e2436;
            padding-bottom: 20px;
        }

        .btn-journal {
            background-color: var(--btn-bg);
            color: var(--text-main);
            border: none;
            padding: 10px 16px;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            font-weight: 500;
        }

        .timer-text {
            color: var(--timer-green);
            font-weight: 600;
            font-size: 15px;
        }

        #signals-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            max-width: 500px;
        }

        .signal-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
        }

        .card-header {
            color: var(--text-muted);
            font-weight: 600;
            font-size: 15px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .signal-header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
