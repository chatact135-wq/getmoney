<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quant Signal System</title>
    <style>
        :root {
            --bg-color: #0b101e;
            --card-bg: #23283b;
            --inner-bg: #151928;
            --text-main: #ffffff;
            --text-muted: #8b93a6;
            --sell-red: #ff4a5a;
            --buy-green: #00c881;
            --timer-green: #2ecf9e;
            --trigger-yellow: #ffc145;
            --btn-bg: #353d52;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 20px;
        }

        h1 {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 0.5px;
            margin: 0 0 15px 0;
            text-transform: uppercase;
        }

        .top-controls {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
            border-bottom: 1px solid #1e2436;
            padding-bottom: 20px;
        }

        .btn-journal {
            background-color: var(--btn-bg);
            color: var(--text-main);
            border: none;
            padding: 10px 16px;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            font-weight: 500;
        }

        .timer-text {
            color: var(--timer-green);
            font-weight: 600;
            font-size: 15px;
        }

        #signals-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            max-width: 500px;
        }

        .signal-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
        }

        .card-header {
            color: var(--text-muted);
            font-weight: 600;
            font-size: 15px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .signal-header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .signal-text {
            font-size: 28px;
            font-weight: 800;
            margin: 0;
        }

        .signal-sell { color: var(--sell-red); }
        .signal-buy { color: var(--buy-green); }

        .triggered-text {
            color: var(--trigger-yellow);
            font-size: 13px;
            font-weight: 600;
        }

        .data-row {
            background-color: var(--inner-bg);
            padding: 12px 15px;
            border-radius: 6px;
            margin-bottom: 8px;
            font-size: 14px;
            display: flex;
            justify-content: flex-start;
        }
        
        .data-row:last-child {
            margin-bottom: 0;
        }

        .data-label { color: var(--text-muted); margin-right: 5px; }
        .data-value { color: var(--text-main); font-weight: 500; }
        .val-tp { color: var(--buy-green); font-weight: 500; }
        .val-sl { color: var(--sell-red); font-weight: 500; }
    </style>
</head>
<body>

    <h1>Quant Signal System</h1>
    
    <div class="top-controls">
        <button class="btn-journal">View Trading Journal</button>
        <span class="timer-text" id="refresh-timer">Next Refresh In: 45s</span>
    </div>

    <div id="signals-container">
        </div>

    <script>
        const REFRESH_INTERVAL = 45; 
        let secondsRemaining = REFRESH_INTERVAL;

        // Default placeholder data matching your exact requested assets and timeframes
        const defaultPairs = [
            {
                pair: "XAU/USD",
                timeframe: "15M",
                signal: "BUY",
                triggered: "Just now",
                entry: "2350.25",
                reason: "M15 Support Breakout + Volume Spike",
                take_profit: "2365.00",
                stop_loss: "2340.00"
            },
            {
                pair: "EUR/USD",
                timeframe: "5M",
                signal: "SELL",
                triggered: "3 mins ago",
                entry: "1.08520",
                reason: "M5 Bearish Engulfing at Resistance",
                take_profit: "1.08100",
                stop_loss: "1.08750"
            }
        ];

        // Function to fetch and render signals
        async function fetchSignals() {
            try {
                const response = await fetch('/api/signals');
                if (response.ok) {
                    const data = await response.json();
                    
                    // If backend sends valid data, use it; otherwise fallback to defaults
                    if (data && data.length > 0) {
                        renderSignals(data);
                    } else {
                        renderSignals(defaultPairs);
                    }
                } else {
                    console.warn("Backend error response. Using default asset configuration.");
                    renderSignals(defaultPairs);
                }
            } catch (error) {
                console.error("Connection error to /api/signals. Displaying interface defaults.");
                renderSignals(defaultPairs);
            }
        }

        // Render data structure directly to visual cards
        function renderSignals(data) {
            const container = document.getElementById('signals-container');
            let html = '';

            data.forEach(item => {
                const isSell = (item.signal || '').toUpperCase() === 'SELL';
                const signalClass = isSell ? 'signal-sell' : 'signal-buy';
                
                const pair = item.pair || 'UNKNOWN';
                const timeframe = item.timeframe || '5M';
                const signal = (item.signal || 'WAIT').toUpperCase();
                const triggered = item.triggered || 'Just now';
                const entry = item.entry || '--';
                const reason = item.reason || '--';
                const tp = item.take_profit || '--';
                const sl = item.stop_loss || '--';

                html += `
                    <div class="signal-card">
                        <div class="card-header">${pair} (${timeframe})</div>
                        <div class="signal-header-row">
                            <h2 class="signal-text ${signalClass}">${signal}</h2>
                            <span class="triggered-text">Triggered: ${triggered}</span>
                        </div>
                        
                        <div class="data-row">
                            <span class="data-label">Entry:</span>
                            <span class="data-value">${entry}</span>
                        </div>
                        <div class="data-row">
                            <span class="data-label">Reason:</span>
                            <span class="data-value">${reason}</span>
                        </div>
                        <div class="data-row">
                            <span class="data-label" style="color: var(--buy-green);">Take Profit:</span>
                            <span class="val-tp">${tp}</span>
                        </div>
                        <div class="data-row">
                            <span class="data-label" style="color: var(--sell-red);">Stop Loss:</span>
                            <span class="val-sl">${sl}</span>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        // Countdown Timer Logic
        function updateTimer() {
            secondsRemaining--;
            
            if (secondsRemaining <= 0) {
                document.getElementById('refresh-timer').innerText = "Refreshing...";
                fetchSignals();
                secondsRemaining = REFRESH_INTERVAL;
            } else {
                document.getElementById('refresh-timer').innerText = `Next Refresh In: ${secondsRemaining}s`;
            }
        }

        // Initial launch sequence
        fetchSignals(); 
        setInterval(updateTimer, 1000);
    </script>
</body>
</html>
