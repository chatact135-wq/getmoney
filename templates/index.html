<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>Quant Signal System</title>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --green: #10b981;
            --red: #ef4444;
            --yellow: #fbbf24;
        }
        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 15px;
        }
        /* Header Setup */
        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid #334155;
            flex-wrap: wrap; 
            gap: 15px;
        }
        .header-container h1 { margin: 0; font-size: 1.5rem; }
        .header-controls { display: flex; align-items: center; gap: 15px; flex-wrap: wrap; }
        .btn {
            background-color: #334155;
            color: white;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 0.9rem;
            transition: background 0.2s;
        }
        .btn:hover { background-color: #475569; }
        .timer { color: #2dd4bf; font-weight: bold; }
        
        /* Grid Setup */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
        .card {
            background-color: var(--card-bg);
            border-radius: 10px;
            padding: 20px;
            border: 1px solid #334155;
        }
        .card h2 { margin-top: 0; font-size: 1.2rem; color: var(--text-muted); }
        
        /* Signal Header with Timer */
        .signal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .signal-action { font-size: 2rem; font-weight: bold; }
        .time-ago { font-size: 0.9rem; color: var(--yellow); font-weight: bold; }
        
        .WAIT { color: var(--text-muted); }
        .BUY { color: var(--green); }
        .SELL { color: var(--red); }
        
        .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .data-box { background: #0f172a; padding: 12px; border-radius: 6px; font-size: 0.9rem; }
        .tp { color: var(--green); }
        .sl { color: var(--red); }

        /* Mobile Responsive */
        @media (max-width: 600px) {
            .header-container { flex-direction: column; align-items: flex-start; }
            .data-grid { grid-template-columns: 1fr; }
            .card h2 { font-size: 1.1rem; }
        }
    </style>
</head>
<body>
    <div class="header-container">
        <h1>QUANT SIGNAL SYSTEM</h1>
        <div class="header-controls">
            <a href="/journal" class="btn">View Trading Journal</a>
            <div class="timer" id="timerDisplay">Next Refresh In: 45s</div>
        </div>
    </div>

    <div class="grid" id="signals-container">
        </div>
<script>
    let timeLeft = 30;
    const timerElement = document.getElementById("refresh-timer");

    function updateTimer() {
        timeLeft--;
        if (timeLeft <= 0) {
            location.reload();
        } else {
            timerElement.innerText = "Next Refresh In: " + timeLeft + "s";
        }
    }
    setInterval(updateTimer, 1000);
</script>

    <script>
        let countdown = 45;
        
        async function fetchSignals() {
            try {
                const response = await fetch('/api/signals');
                const data = await response.json();
                
                const container = document.getElementById('signals-container');
                container.innerHTML = '';
                
                for (const [pair, signal] of Object.entries(data)) {
                    const card = document.createElement('div');
                    card.className = 'card';
                    
                    let actionClass = signal.action === 'BUY' ? 'BUY' : signal.action === 'SELL' ? 'SELL' : 'WAIT';
                    
                    // Create the live timestamp badge only if it's a BUY or SELL
                    let timeBadge = '';
                    if (signal.action !== 'WAIT' && signal.timestamp) {
                        timeBadge = `<div class="time-ago" data-timestamp="${signal.timestamp}">Triggered: Just now</div>`;
                    }

                    // Also fixed the (15M) text to say (5M) here!
                    card.innerHTML = `
                        <h2>${pair} (5M)</h2>
                        <div class="signal-header">
                            <div class="signal-action ${actionClass}">${signal.action}</div>
                            ${timeBadge}
                        </div>
                        <div class="data-grid">
                            <div class="data-box">Entry: ${signal.entry}</div>
                            <div class="data-box">Reason: ${signal.reason}</div>
                            <div class="data-box tp">Take Profit: ${signal.tp}</div>
                            <div class="data-box sl">Stop Loss: ${signal.sl}</div>
                        </div>
                    `;
                    container.appendChild(card);
                }
            } catch (e) {
                console.error("Failed to fetch signals", e);
            }
        }

        // Main API Refresh Timer
        setInterval(() => {
            countdown--;
            if (countdown <= 0) {
                countdown = 45;
                fetchSignals();
            }
            document.getElementById('timerDisplay').innerText = `Next Refresh In: ${countdown}s`;
        }, 1000);

        // Live 'Time Ago' Counter (Updates independently every second)
        setInterval(() => {
            const now = Math.floor(Date.now() / 1000);
            document.querySelectorAll('.time-ago').forEach(el => {
                const ts = parseInt(el.getAttribute('data-timestamp'));
                if (!ts) return;
                
                const diff = now - ts;
                if (diff < 60) {
                    el.innerText = `Triggered: ${diff}s ago`;
                } else {
                    const mins = Math.floor(diff / 60);
                    const secs = diff % 60;
                    el.innerText = `Triggered: ${mins}m ${secs}s ago`;
                }
            });
        }, 1000);

        // Initial fetch on load
        fetchSignals();
    </script>
</body>
</html>
