<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quant Signal System</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --buy-color: #10b981;
            --sell-color: #ef4444;
            --wait-color: #fbbf24;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 1px solid #334155;
            padding-bottom: 15px;
        }
        .header h1 { margin: 0; font-size: 24px; letter-spacing: 1px; }
        .nav-btn {
            background: #334155;
            color: white;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 14px;
        }
        /* Grid Layout for Multiple Assets */
        #signals-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            border: 1px solid #334155;
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .pair-name { font-weight: bold; font-size: 18px; color: var(--text-muted); }
        .action-text { font-size: 28px; font-weight: 800; margin: 10px 0; }
        
        .BUY { color: var(--buy-color); }
        .SELL { color: var(--sell-color); }
        .WAIT { color: var(--wait-color); }

        .data-row {
            background: #0f172a;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 8px;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
        }
        .data-label { color: var(--text-muted); }
    </style>
</head>
<body>

    <div class="header">
        <h1>QUANT SIGNAL SYSTEM</h1>
        <div>
            <a href="/journal" class="nav-btn">View Trading Journal</a>
            <span style="margin-left: 15px; color: #10b981; font-size: 14px;" id="refresh-timer">Refreshing...</span>
        </div>
    </div>

    <div id="signals-container">
        </div>

    <script>
        async function fetchSignals() {
            try {
                const response = await fetch('/api/signals');
                const data = await response.json();
                
                const container = document.getElementById('signals-container');
                container.innerHTML = ''; 

                for (const [pair, signal] of Object.entries(data)) {
                    // Create the Card UI
                    const card = document.createElement('div');
                    card.className = 'card';
                    
                    const actionClass = signal.action; 
                    
                    card.innerHTML = `
                        <div class="card-header">
                            <div class="pair-name">${pair} (5M)</div>
                            <div style="font-size: 12px; color: #fbbf24;">Live</div>
                        </div>
                        <div class="action-text ${actionClass}">${signal.action}</div>
                        
                        <div class="data-row">
                            <span class="data-label">Entry:</span>
                            <span>${signal.entry !== "-" ? signal.entry : "Waiting"}</span>
                        </div>
                        <div class="data-row">
                            <span class="data-label">Reason:</span>
                            <span>${signal.reason}</span>
                        </div>
                        <div class="data-row" style="border-left: 3px solid #10b981;">
                            <span class="data-label">Take Profit:</span>
                            <span>${signal.tp}</span>
                        </div>
                        <div class="data-row" style="border-left: 3px solid #ef4444;">
                            <span class="data-label">Stop Loss:</span>
                            <span>${signal.sl}</span>
                        </div>
                    `;
                    container.appendChild(card);
                }
            } catch (error) {
                console.error('Error fetching signals:', error);
            }
        }

        // Fetch immediately, then every 30 seconds
        fetchSignals();
        setInterval(fetchSignals, 30000);
    </script>
</body>
</html>
